<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UtilMint - Goals & Targets</title>
  <!-- Google Fonts & Lucide Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* ==========================================================================
       CSS VARIABLES & THEME SETUP
       ========================================================================== */
    :root {
      --primary: #10B981;
      --primary-hover: #059669;
      --primary-light: #ECFDF5;
      --primary-glow: rgba(16, 185, 129, 0.15);

      --bg-main: #F8FAFC;
      --bg-card: #FFFFFF;
      --bg-sidebar: #FFFFFF;
      --border: #E2E8F0;

      --text-main: #0F172A;
      --text-muted: #64748B;
      --text-white: #FFFFFF;

      --accent-run: #10B981;
      --accent-jog: #F97316;
      --accent-walk: #8B5CF6;
      --accent-blue: #3B82F6;
      --danger: #EF4444;

      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-full: 9999px;

      --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -2px rgba(0,0,0,0.03);

      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Dark Theme Overrides */
    [data-theme="dark"] {
      --bg-main: #0F172A;
      --bg-card: #1E293B;
      --bg-sidebar: #1E293B;
      --border: #334155;

      --text-main: #F8FAFC;
      --text-muted: #94A3B8;

      --primary-light: rgba(16, 185, 129, 0.1);
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.3);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.4);
    }

    /* Reset & Base Styles */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    a { text-decoration: none; color: inherit; }

    /* ==========================================================================
       LAYOUT STRUCTURE
       ========================================================================== */
    .app-container {
      display: flex;
      min-height: 100vh;
      width: 100%;
    }

    /* Sidebar Navigation (Desktop) */
    .sidebar {
      width: 260px;
      background-color: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
      z-index: 100;
      transition: var(--transition);
    }

    .brand-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 12px 28px 12px;
    }

    .brand-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), #34D399);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-white);
      box-shadow: 0 4px 12px var(--primary-glow);
    }

    .brand-name {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--text-main), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .nav-item a {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text-muted);
      transition: var(--transition);
    }

    .nav-item a:hover {
      background-color: var(--primary-light);
      color: var(--primary);
    }

    .nav-item.active a {
      background-color: var(--primary);
      color: var(--text-white);
      box-shadow: 0 4px 12px var(--primary-glow);
    }

    /* Main Content Area */
    .main-wrapper {
      flex: 1;
      margin-left: 260px;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* Header Bar */
    .top-header {
      height: 72px;
      background-color: var(--bg-card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      position: sticky;
      top: 0;
      z-index: 90;
    }

    .header-title h1 {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .header-title p {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .theme-toggle, .unit-toggle {
      background: var(--bg-main);
      border: 1px solid var(--border);
      color: var(--text-main);
      padding: 8px 12px;
      border-radius: var(--radius-md);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 0.85rem;
      transition: var(--transition);
    }

    .theme-toggle:hover, .unit-toggle:hover {
      border-color: var(--primary);
    }

    .btn-primary {
      background-color: var(--primary);
      color: var(--text-white);
      border: none;
      padding: 10px 20px;
      border-radius: var(--radius-md);
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: var(--transition);
      box-shadow: 0 4px 12px var(--primary-glow);
    }

    .btn-primary:hover {
      background-color: var(--primary-hover);
      transform: translateY(-1px);
    }

    /* Goals Main Content */
    .content-body {
      padding: 32px;
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
    }

    .section-label {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* Goals List Grid */
    .goals-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
      margin-bottom: 32px;
    }

    .goal-card {
      background-color: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
    }

    .goal-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
      border-color: var(--primary);
    }

    .goal-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .goal-type-badge {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-white);
      font-weight: bold;
    }

    .goal-type-badge.distance { background: linear-gradient(135deg, #10B981, #059669); }
    .goal-type-badge.workouts { background: linear-gradient(135deg, #F97316, #EA580C); }
    .goal-type-badge.duration { background: linear-gradient(135deg, #8B5CF6, #7C3AED); }

    .btn-delete-goal {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 6px;
      border-radius: var(--radius-sm);
      transition: var(--transition);
    }

    .btn-delete-goal:hover {
      color: var(--danger);
      background-color: rgba(239, 68, 68, 0.1);
    }

    .goal-title {
      font-size: 1.1rem;
      font-weight: 800;
    }

    .goal-target-text {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .progress-bar-wrapper {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .progress-bar-bg {
      height: 10px;
      background-color: var(--bg-main);
      border: 1px solid var(--border);
      border-radius: var(--radius-full);
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #10B981, #34D399);
      border-radius: var(--radius-full);
      width: 0%;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .goal-stats-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      font-weight: 700;
    }

    .goal-status-tag {
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: var(--radius-full);
      font-weight: 700;
      align-self: flex-start;
    }

    .goal-status-tag.completed {
      background-color: rgba(16, 185, 129, 0.15);
      color: var(--primary);
    }

    .goal-status-tag.active {
      background-color: rgba(59, 130, 246, 0.15);
      color: var(--accent-blue);
    }

    /* Modal Form for Goal Creation */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(4px);
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px;
      max-width: 480px;
      width: 90%;
      box-shadow: var(--shadow-lg);
    }

    .modal-card h3 {
      font-size: 1.3rem;
      font-weight: 800;
      margin-bottom: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
      text-align: left;
    }

    .form-group label {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-muted);
    }

    .form-control {
      background: var(--bg-main);
      border: 1px solid var(--border);
      color: var(--text-main);
      padding: 10px 14px;
      border-radius: var(--radius-md);
      font-family: inherit;
      font-weight: 600;
      font-size: 0.9rem;
      outline: none;
    }

    .form-control:focus {
      border-color: var(--primary);
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 24px;
    }

    .btn-secondary {
      background: var(--bg-main);
      border: 1px solid var(--border);
      color: var(--text-main);
      padding: 10px 18px;
      border-radius: var(--radius-md);
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
    }

    .btn-secondary:hover {
      border-color: var(--primary);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      grid-column: 1 / -1;
      background-color: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
    }

    .empty-icon {
      width: 64px;
      height: 64px;
      background-color: var(--primary-light);
      color: var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }

    .empty-title {
      font-size: 1.2rem;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .empty-desc {
      font-size: 0.9rem;
      color: var(--text-muted);
      max-width: 340px;
      margin-bottom: 20px;
    }

    /* Mobile Bottom Navigation */
    .mobile-nav {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 64px;
      background-color: var(--bg-card);
      border-top: 1px solid var(--border);
      z-index: 1000;
      padding: 0 12px;
    }

    .mobile-nav-list {
      display: flex;
      align-items: center;
      justify-content: space-around;
      height: 100%;
      list-style: none;
    }

    .mobile-nav-item a {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    .mobile-nav-item.active a { color: var(--primary); }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main-wrapper { margin-left: 0; padding-bottom: 64px; }
      .mobile-nav { display: block; }
      .top-header { padding: 0 16px; }
      .content-body { padding: 16px; }
    }
  </style>
</head>
<body>

  <div class="app-container">
    
    <!-- DESKTOP SIDEBAR -->
    <aside class="sidebar">
      <div class="brand-logo">
        <div class="brand-icon">
          <i data-lucide="activity"></i>
        </div>
        <span class="brand-name">UtilMint</span>
      </div>

      <nav>
        <ul class="nav-list">
          <li class="nav-item">
            <a href="index.html">
              <i data-lucide="layout-dashboard"></i>
              <span>Dashboard</span>
            </a>
          </li>
          <li class="nav-item">
            <a href="startactivity.html">
              <i data-lucide="play-circle"></i>
              <span>Start Activity</span>
            </a>
          </li>
          <li class="nav-item">
            <a href="progress.html">
              <i data-lucide="line-chart"></i>
              <span>Progress</span>
            </a>
          </li>
          <li class="nav-item active">
            <a href="goals.html">
              <i data-lucide="target"></i>
              <span>Goals</span>
            </a>
          </li>
          <li class="nav-item">
            <a href="profile.html">
              <i data-lucide="user"></i>
              <span>Profile</span>
            </a>
          </li>
        </ul>
      </nav>
    </aside>

    <!-- MAIN WRAPPER -->
    <div class="main-wrapper">
      
      <!-- TOP HEADER -->
      <header class="top-header">
        <div class="header-title">
          <h1>Fitness Targets & Goals</h1>
          <p>Track real activity milestones</p>
        </div>

        <div class="header-actions">
          <button class="unit-toggle" id="unitToggleBtn">
            <i data-lucide="ruler"></i>
            <span id="unitText">KM</span>
          </button>

          <button class="theme-toggle" id="themeToggleBtn">
            <i data-lucide="sun" id="themeIcon"></i>
          </button>

          <button class="btn-primary" id="openGoalModalBtn">
            <i data-lucide="plus"></i>
            <span>Set New Goal</span>
          </button>
        </div>
      </header>

      <!-- MAIN CONTENT -->
      <main class="content-body">
        
        <div class="section-label">
          <span>Active Goals Progress</span>
        </div>

        <div class="goals-grid" id="goalsContainer">
          <!-- Dynamically populated or empty state -->
        </div>

      </main>

    </div>

    <!-- MOBILE NAVIGATION -->
    <nav class="mobile-nav">
      <ul class="mobile-nav-list">
        <li class="mobile-nav-item">
          <a href="index.html"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></a>
        </li>
        <li class="mobile-nav-item">
          <a href="startactivity.html"><i data-lucide="play-circle"></i><span>Start</span></a>
        </li>
        <li class="mobile-nav-item">
          <a href="progress.html"><i data-lucide="line-chart"></i><span>Progress</span></a>
        </li>
        <li class="mobile-nav-item active">
          <a href="goals.html"><i data-lucide="target"></i><span>Goals</span></a>
        </li>
        <li class="mobile-nav-item">
          <a href="profile.html"><i data-lucide="user"></i><span>Profile</span></a>
        </li>
      </ul>
    </nav>

  </div>

  <!-- CREATE GOAL MODAL -->
  <div class="modal-overlay" id="goalModal">
    <div class="modal-card">
      <h3>Create New Fitness Goal</h3>
      
      <form id="createGoalForm">
        <div class="form-group">
          <label for="goalTitle">Goal Title</label>
          <input type="text" id="goalTitle" class="form-control" placeholder="e.g. Run 50 KM this month" required>
        </div>

        <div class="form-group">
          <label for="goalType">Target Type</label>
          <select id="goalType" class="form-control">
            <option value="distance">Total Distance</option>
            <option value="workouts">Total Workouts Completed</option>
            <option value="duration">Active Time (Hours)</option>
          </select>
        </div>

        <div class="form-group">
          <label for="goalTarget">Target Value</label>
          <input type="number" id="goalTarget" class="form-control" placeholder="100" min="1" step="any" required>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn-secondary" id="closeGoalModalBtn">Cancel</button>
          <button type="submit" class="btn-primary">Save Goal</button>
        </div>
      </form>
    </div>
  </div>

  <!-- JAVASCRIPT LOGIC -->
  <script>
    /* ==========================================================================
       DATA STORAGE & UTILITIES
       ========================================================================== */
    const STORAGE_KEYS = {
      ACTIVITIES: 'utilmint_activities',
      GOALS: 'utilmint_goals',
      SETTINGS: 'utilmint_settings'
    };

    function getSettings() {
      const defaults = { theme: 'light', unit: 'KM' };
      try {
        const stored = localStorage.getItem(STORAGE_KEYS.SETTINGS);
        return stored ? { ...defaults, ...JSON.parse(stored) } : defaults;
      } catch (e) { return defaults; }
    }

    function saveSettings(settings) {
      localStorage.setItem(STORAGE_KEYS.SETTINGS, JSON.stringify(settings));
    }

    function getStoredActivities() {
      try {
        const stored = localStorage.getItem(STORAGE_KEYS.ACTIVITIES);
        return stored ? JSON.parse(stored) : [];
      } catch (e) { return []; }
    }

    function getStoredGoals() {
      try {
        const stored = localStorage.getItem(STORAGE_KEYS.GOALS);
        return stored ? JSON.parse(stored) : [];
      } catch (e) { return []; }
    }

    function saveGoals(goals) {
      localStorage.setItem(STORAGE_KEYS.GOALS, JSON.stringify(goals));
    }

    function convertDistance(km, unit) {
      return unit === 'MI' ? km * 0.621371 : km;
    }

    /* ==========================================================================
       REAL GOAL CALCULATIONS & RENDER
       ========================================================================== */
    function renderGoalsPage() {
      const goals = getStoredGoals();
      const activities = getStoredActivities();
      const settings = getSettings();
      const unitLabel = settings.unit.toLowerCase();

      const container = document.getElementById('goalsContainer');
      container.innerHTML = '';

      if (!goals || goals.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">
              <i data-lucide="target"></i>
            </div>
            <div class="empty-title">No goals created yet</div>
            <div class="empty-desc">Set personalized targets for distance, workouts, or duration based on real workout progress.</div>
            <button class="btn-primary" onclick="openModal()">
              <i data-lucide="plus"></i>
              <span>Create Your First Goal</span>
            </button>
          </div>
        `;
        lucide.createIcons();
        return;
      }

      goals.forEach(goal => {
        let currentVal = 0;

        // Calculate progress dynamically from stored activity records
        activities.forEach(act => {
          if (goal.type === 'distance') {
            const km = act.distanceKm || 0;
            currentVal += convertDistance(km, settings.unit);
          } else if (goal.type === 'workouts') {
            currentVal += 1;
          } else if (goal.type === 'duration') {
            currentVal += ((act.durationSeconds || 0) / 3600); // in hours
          }
        });

        const target = goal.targetValue || 1;
        const pct = Math.min(Math.round((currentVal / target) * 100), 100);
        const isCompleted = pct >= 100;

        let iconName = 'navigation';
        let badgeClass = 'distance';
        let displayUnit = settings.unit;

        if (goal.type === 'workouts') {
          iconName = 'trophy';
          badgeClass = 'workouts';
          displayUnit = 'workouts';
        } else if (goal.type === 'duration') {
          iconName = 'clock';
          badgeClass = 'duration';
          displayUnit = 'hrs';
        }

        const card = document.createElement('div');
        card.className = 'goal-card';
        card.innerHTML = `
          <div class="goal-card-header">
            <div class="goal-type-badge ${badgeClass}">
              <i data-lucide="${iconName}"></i>
            </div>
            <button class="btn-delete-goal" onclick="deleteGoal('${goal.id}')" title="Delete Goal">
              <i data-lucide="trash-2"></i>
            </button>
          </div>

          <div>
            <div class="goal-title">${goal.title || 'Fitness Target'}</div>
            <div class="goal-target-text">Target: ${target} ${displayUnit}</div>
          </div>

          <div class="progress-bar-wrapper">
            <div class="goal-stats-row">
              <span>Progress</span>
              <span>${pct}%</span>
            </div>
            <div class="progress-bar-bg">
              <div class="progress-bar-fill" style="width: ${pct}%"></div>
            </div>
          </div>

          <div style="display:flex; justify-content:space-between; align-items:center; margin-top: auto;">
            <span class="goal-status-tag ${isCompleted ? 'completed' : 'active'}">
              ${isCompleted ? 'Completed 🎉' : 'In Progress'}
            </span>
            <span style="font-size:0.85rem; font-weight:700; color:var(--text-muted);">
              ${currentVal.toFixed(1)} / ${target} ${displayUnit}
            </span>
          </div>
        `;

        container.appendChild(card);
      });

      lucide.createIcons();
    }

    function createGoal(e) {
      e.preventDefault();

      const title = document.getElementById('goalTitle').value.trim();
      const type = document.getElementById('goalType').value;
      const targetValue = parseFloat(document.getElementById('goalTarget').value);

      if (!title || isNaN(targetValue) || targetValue <= 0) return;

      const newGoal = {
        id: 'goal_' + Date.now(),
        title,
        type,
        targetValue,
        createdAt: new Date().toISOString()
      };

      const goals = getStoredGoals();
      goals.push(newGoal);
      saveGoals(goals);

      closeModal();
      document.getElementById('createGoalForm').reset();
      renderGoalsPage();
    }

    function deleteGoal(id) {
      if (!confirm("Are you sure you want to delete this goal?")) return;
      const goals = getStoredGoals();
      const updated = goals.filter(g => g.id !== id);
      saveGoals(updated);
      renderGoalsPage();
    }

    /* ==========================================================================
       MODAL CONTROLS & THEME
       ========================================================================== */
    function openModal() {
      document.getElementById('goalModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('goalModal').classList.remove('active');
    }

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      const themeIcon = document.getElementById('themeIcon');
      if (themeIcon) {
        themeIcon.setAttribute('data-lucide', theme === 'dark' ? 'moon' : 'sun');
        lucide.createIcons();
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      const settings = getSettings();
      applyTheme(settings.theme);
      document.getElementById('unitText').textContent = settings.unit;

      renderGoalsPage();

      document.getElementById('openGoalModalBtn').addEventListener('click', openModal);
      document.getElementById('closeGoalModalBtn').addEventListener('click', closeModal);
      document.getElementById('createGoalForm').addEventListener('submit', createGoal);

      document.getElementById('themeToggleBtn').addEventListener('click', () => {
        const current = getSettings();
        current.theme = current.theme === 'light' ? 'dark' : 'light';
        saveSettings(current);
        applyTheme(current.theme);
        renderGoalsPage();
      });

      document.getElementById('unitToggleBtn').addEventListener('click', () => {
        const current = getSettings();
        current.unit = current.unit === 'KM' ? 'MI' : 'KM';
        saveSettings(current);
        document.getElementById('unitText').textContent = current.unit;
        renderGoalsPage();
      });

      lucide.createIcons();
    });
  </script>
</body>
</html>
